<!DOCTYPE html>
<html>
<head>
    <title>Zilo Fashion Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            text-align: center;
        }
        header {
            background-color: #222;
            color: white;
            padding: 20px;
        }
        .products {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }
        .card {
            background: white;
            width: 250px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card img {
            width: 100%;
            border-radius: 10px;
        }
        button {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e65c00;
        }
    </style>
</head>
<body>

<header>
    <h1>Zilo Fashion Store</h1>
    <p>Recycled Saris & Fancy Shirts Collection</p>
</header>

<div class="products">

    <div class="card">
        <img src="sari1.jpg" alt="Recycled Sari">
        <h3>Recycled Sari</h3>
        <p>Price: ₹999</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="shirt1.jpg" alt="Fancy Shirt">
        <h3>Fancy Shirt</h3>
        <p>Price: ₹799</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
