<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZILO Shopping</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f1f3f6;
}

/* HEADER */
header{
    background:#2874f0;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}
header h1{margin:0}
input[type="text"]{
    width:40%;
    padding:8px;
    border:none;
    border-radius:3px;
}

/* PRODUCT GRID */
.container{
    padding:20px;
}
.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}
.card{
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
    text-align:center;
}
.card img{width:100%;height:220px;object-fit:cover}
button{
    background:#fb641b;
    border:none;
    color:white;
    padding:8px 15px;
    cursor:pointer;
    border-radius:3px;
}

/* CART BOX */
#cartBox{
    position:fixed;
    right:0;
    top:0;
    width:250px;
    height:100%;
    background:white;
    border-left:3px solid #2874f0;
    padding:15px;
    overflow:auto;
}
</style>
</head>

<body>

<header>
<h1>ZILO</h1>
<input type="text" placeholder="Search for saris..." onkeyup="searchProduct(this.value)">
<div>Cart ₹<span id="total">0</span></div>
</header>

<div class="container">
<div class="products" id="productList">

<div class="card" data-name="silk sari">
<img src="https://via.placeholder.com/300x300">
<h3>Silk Sari</h3>
<p>₹2500</p>
<button onclick="addToCart('Silk Sari',2500)">Add to Cart</button>
</div>

<div class="card" data-name="cotton sari">
<img src="https://via.placeholder.com/300x300">
<h3>Cotton Sari</h3>
<p>₹1200</p>
<button onclick="addToCart('Cotton Sari',1200)">Add to Cart</button>
</div>

<div class="card" data-name="designer sari">
<img src="https://via.placeholder.com/300x300">
<h3>Designer Sari</h3>
<p>₹3200</p>
<button onclick="addToCart('Designer Sari',3200)">Add to Cart</button>
</div>

<div class="card" data-name="banarasi sari">
<img src="https://via.placeholder.com/300x300">
<h3>Banarasi Sari</h3>
<p>₹4200</p>
<button onclick="addToCart('Banarasi Sari',4200)">Add to Cart</button>
</div>

</div>
</div>

<!-- CART -->
<div id="cartBox">
<h3>Your Cart</h3>
<ul id="cartItems"></ul>
<p><b>Total ₹<span id="total2">0</span></b></p>
</div>

<script>
let total=0;

function addToCart(name,price){
    let li=document.createElement("li");
    li.textContent=name+" - ₹"+price;
    document.getElementById("cartItems").appendChild(li);
    total+=price;
    document.getElementById("total").textContent=total;
    document.getElementById("total2").textContent=total;
}

function searchProduct(value){
    let cards=document.querySelectorAll(".card");
    cards.forEach(card=>{
        let name=card.dataset.name;
        card.style.display=name.includes(value.toLowerCase())?"block":"none";
    });
}
</script>

</body>
</html>
